<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher | Brainspeed International</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --primary: #4338ca; --primary-hover: #3730a3; --danger: #ef4444; --danger-hover: #dc2626; --success: #10b981; --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); --card-bg: rgba(255, 255, 255, 0.95); --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); color: var(--text); padding: 3vw; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 750px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px 30px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); backdrop-filter: blur(10px); }
        .brand { color: var(--primary); font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
        .card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01); padding: 40px; border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(10px); }
        .tabs { display: flex; gap: 12px; margin-bottom: 30px; background: #e2e8f0; padding: 6px; border-radius: 9999px; display: inline-flex; }
        .tab { padding: 10px 24px; border-radius: 9999px; cursor: pointer; font-weight: 600; color: var(--text-muted); transition: all 0.3s ease; font-size: 14px; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .view { display: none; animation: fadeIn 0.4s ease; } .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        select, input, textarea { width: 100%; padding: 16px; margin: 8px 0 24px 0; border: 1px solid var(--border); border-radius: 12px; font-family: 'Inter'; box-sizing: border-box; background: #f8fafc; transition: border-color 0.3s, box-shadow 0.3s; font-size: 15px; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1); }
        label { font-weight: 600; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        button { padding: 16px; font-weight: 600; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; transition: all 0.3s ease; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:active { transform: scale(0.98); }
        #checkInBtn { background: var(--primary); box-shadow: 0 4px 14px 0 rgba(67, 56, 202, 0.39); } #checkInBtn:hover { background: var(--primary-hover); }
        #checkOutBtn { background: var(--danger); display: none; box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39); } #checkOutBtn:hover { background: var(--danger-hover); }
        .btn-save { background: var(--success); box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39); } .btn-save:hover { background: #059669; }
        .status-box { margin-top: 24px; padding: 24px; border-radius: 12px; background: #e0e7ff; color: #3730a3; display: none; border: 1px solid #c7d2fe; text-align: center; }
        .logout { color: var(--danger); text-decoration: none; font-weight: 600; cursor: pointer; font-size: 14px; padding: 8px 16px; border-radius: 8px; transition: background 0.2s; }
        .logout:hover { background: #fee2e2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">✨ Brainspeed</div>
            <div style="display:flex; align-items:center; gap:15px;">
                <span style="font-weight:600; font-size:15px; color: var(--text-muted);">Teacher <span id="teacherName" style="color: var(--text);"></span></span>
                <a class="logout" onclick="handleLogout()">Sign Out</a>
            </div>
        </div>

        <div style="text-align: center;">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('logger', this)">Live Session Console</div>
                <div class="tab" onclick="switchTab('profile', this)">Professional Profile</div>
            </div>
        </div>

        <div class="card">
            <div id="logger-view" class="view active">
                <h2 style="margin-top:0; font-weight:800; color:var(--text); font-size: 24px; margin-bottom: 24px;">Initialize Lesson</h2>
                
                <label>Select Student Protocol</label>
                <select id="studentId"><option value="">-- Load Roster --</option></select>

                <label>Academic Subject</label>
                <select id="subjectTaught">
                    <option value="Mathematics">Mathematics</option><option value="English Language">English Language</option>
                    <option value="Physics">Physics</option><option value="Chemistry">Chemistry</option><option value="Biology">Biology</option>
                    <option value="Basic Science">Basic Science</option><option value="Economics">Economics</option>
                    <option value="Government/History">Government/History</option><option value="Geography">Geography</option>
                    <option value="Computer Science/ICT">Computer Science/ICT</option><option value="Other">Other</option>
                </select>

                <button id="checkInBtn" onclick="initiateCheckIn()">📍 Activate GPS Tracking & Start Lesson</button>
                <button id="checkOutBtn" onclick="handleCheckOut()">⏹ Terminate Session & Synchronize</button>

                <div id="statusBox" class="status-box">
                    <div style="font-size:18px; font-weight:800; margin-bottom:8px;">⏳ Session in Progress</div>
                    Commenced at: <span id="timeDisplay" style="font-weight:600; background: white; padding: 4px 10px; border-radius: 6px; margin-left: 8px;"></span>
                </div>
            </div>

            <div id="profile-view" class="view">
                <h2 style="margin-top:0; font-weight:800; font-size: 24px; margin-bottom: 24px;">Academic Credentials</h2>
                <label>Areas of Expertise</label>
                <input type="text" id="profSubjects" placeholder="e.g., Advanced Calculus, Quantum Physics">

                <label>Professional Biography</label>
                <textarea id="profBio" rows="4" placeholder="Detail your academic background and teaching philosophy..."></textarea>

                <button class="btn-save" onclick="saveProfile()">💾 Commit Profile Updates</button>
            </div>
        </div>
    </div>

    <script>
        const tid = localStorage.getItem('user_id');
        if(!tid) window.location.href='/';
        document.getElementById('teacherName').innerText = localStorage.getItem('username').toUpperCase();
        let activeSession = JSON.parse(localStorage.getItem('active_lesson')) || null;

        function switchTab(viewId, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            el.classList.add('active'); document.getElementById(viewId + '-view').classList.add('active');
        }

        async function loadStudents() {
            const res = await fetch('/api/users/student'); const students = await res.json();
            const select = document.getElementById('studentId'); select.innerHTML = '<option value="">-- Select Registered Student --</option>';
            students.forEach(st => select.innerHTML += `<option value="${st.id}">${st.username.toUpperCase()}</option>`);
            updateUI();
        }

        async function loadProfile() {
            const res = await fetch(`/api/profile/${tid}`); const profile = await res.json();
            document.getElementById('profSubjects').value = profile.subjects || '';
            document.getElementById('profBio').value = profile.bio || '';
        }

        async function saveProfile() {
            const subjects = document.getElementById('profSubjects').value;
            const bio = document.getElementById('profBio').value;
            await fetch(`/api/profile/${tid}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({subjects, bio}) });
            alert("Credentials successfully updated in the master database.");
        }

        function updateUI() {
            if (activeSession) {
                document.getElementById('checkInBtn').style.display = 'none'; document.getElementById('checkOutBtn').style.display = 'flex';
                document.getElementById('statusBox').style.display = 'block'; document.getElementById('timeDisplay').innerText = new Date(activeSession.check_in_time).toLocaleTimeString();
                document.getElementById('studentId').value = activeSession.student_id; document.getElementById('studentId').disabled = true; document.getElementById('subjectTaught').disabled = true;
            } else {
                document.getElementById('checkInBtn').style.display = 'flex'; document.getElementById('checkOutBtn').style.display = 'none';
                document.getElementById('statusBox').style.display = 'none'; document.getElementById('studentId').disabled = false; document.getElementById('subjectTaught').disabled = false;
            }
        }

        function initiateCheckIn() {
            if(!document.getElementById('studentId').value) return alert("You must select a student protocol.");
            document.getElementById('checkInBtn').innerHTML = "⏳ Acquiring Satellite Lock...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => proceedCheckIn(pos.coords.latitude, pos.coords.longitude),
                    (err) => proceedCheckIn(0, 0) // proceed anyway if denied
                );
            } else proceedCheckIn(0, 0);
        }

        function proceedCheckIn(lat, lng) {
            const today = new Date().toISOString().split('T')[0];
            activeSession = { 
                teacher_id: tid, 
                student_id: document.getElementById('studentId').value, 
                subject: document.getElementById('subjectTaught').value, 
                session_date: today,
                check_in_time: new Date().toISOString(), lat: lat, lng: lng 
            };
            localStorage.setItem('active_lesson', JSON.stringify(activeSession)); updateUI();
            document.getElementById('checkInBtn').innerHTML = "📍 Activate GPS Tracking & Start Lesson";
        }

        async function handleCheckOut() {
            const end = new Date(), start = new Date(activeSession.check_in_time);
            const res = await fetch('/api/sessions', { method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({...activeSession, check_out_time: end.toLocaleString(), check_in_time: start.toLocaleString(), hours: ((end - start) / 3600000).toFixed(2)})
            });
            if(res.ok) { alert("Session successfully synchronized with global database."); localStorage.removeItem('active_lesson'); activeSession = null; updateUI(); }
        }

        // --- Automated Sign Out Protocols ---
        async function handleLogout() {
            if (tid) {
                try { await fetch('/api/sessions/auto-checkout', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ teacher_id: tid }) }); } catch (e) {}
            }
            localStorage.clear(); window.location.href = '/';
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden' && tid) {
                const blob = new Blob([JSON.stringify({ teacher_id: tid })], { type: 'application/json' });
                navigator.sendBeacon('/api/sessions/auto-checkout', blob);
            }
        });

        loadStudents(); loadProfile();
    </script>
</body>
</html>
